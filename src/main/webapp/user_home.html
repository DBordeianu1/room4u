<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="nav-links">
      <button class="active">Home</button>
      <button>Find a room</button>
      <button>My rooms</button>
      <button>Sign Out</button>
    </div>
  </header>

  
  <div class="glass_container_big">

    <h2>Welcome back, Jane Doe!</h2>
    <br>
    <div class="section">
      <h3>📍 Available Rooms Per Area</h3>
      <div class="list_item">
        <span>Utah <small>United States of America</small></span>
        <strong>447 Available Rooms</strong>
      </div>

      <div class="list_item">
        <span>Ontario <small>Canada</small></span>
        <strong>1082 Available Rooms</strong>
      </div>
    </div>

    <div class="section">
      <h3>👥 Capacity Per Hotel</h3>

      <div class="list_item">
        <span>Holiday Inn <small>Ottawa, Ontario, Canada</small></span>
        <strong>586 Guest Capacity</strong>
      </div>

      <div class="list_item">
        <span>The Mariott Inn <small>Toronto, Ontario, Canada</small></span>
        <strong>183 Guest Capacity</strong>
      </div>
    </div>

  </div>
</body>
</html>
